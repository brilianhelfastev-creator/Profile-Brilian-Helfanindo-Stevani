services:
  - type: web
    name: brilian-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: DB_HOST
        fromDatabase:
          name: brilian-db
          property: host
      - key: DB_USER
        fromDatabase:
          name: brilian-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: brilian-db
          property: password
      - key: DB_NAME
        value: profile_db
      - key: DB_PORT
        value: 3306
      - key: CORS_ORIGIN
        value: https://brianiahelfanindo.github.io,http://localhost:3000,http://localhost:5000,http://localhost:8080
      - key: DB_CONNECTION_TIMEOUT
        value: 30000
      - key: DB_CONNECTION_LIMIT
        value: 10
      - key: DB_RETRY_ATTEMPTS
        value: 3
      - key: DB_RETRY_DELAY
        value: 1000

databases:
  - name: brilian-db
    databaseName: profile_db
    user: root
    plan: free
    version: 8.0
